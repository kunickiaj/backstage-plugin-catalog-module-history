name: CI

on:
  push:
    branches: [main]
  # No branches filter on pull_request: fires on every PR including the
  # stacked PRs that target other feature branches rather than main.
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Lint, build, test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: backstage_plugin_history_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: backstage_plugin_history_test
      BACKSTAGE_TEST_DATABASE_POSTGRES16_CONNECTION_STRING: postgres://postgres:postgres@localhost:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Prettier check
        run: yarn prettier:check

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn tsc

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
