version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      backstage:
        patterns:
          - '@backstage/*'
        update-types:
          - minor
          - patch
    allow:
      - dependency-name: '@backstage/*'
      - dependency-name: '@types/*'
      - dependency-name: 'typescript'
      - dependency-name: 'knex'
      - dependency-name: 'pg'
      - dependency-name: 'jest'
      - dependency-name: 'prettier'
    labels:
      - dependencies
      - npm

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
