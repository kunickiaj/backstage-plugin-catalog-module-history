version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      backstage:
        patterns:
          - '@backstage/*'
        update-types:
          - minor
          - patch
    allow:
      - dependency-name: '@backstage/*'
      - dependency-name: '@types/*'
      - dependency-name: 'typescript'
      - dependency-name: 'knex'
      - dependency-name: 'pg'
      - dependency-name: 'jest'
      - dependency-name: 'prettier'
    ignore:
      # Backstage supports the active Node LTS versions (currently 22 and 24).
      # Pinning @types/node to the highest supported LTS major prevents
      # accidental use of Node-25-only APIs that would break on Node 24.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    labels:
      - dependencies
      - npm

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
